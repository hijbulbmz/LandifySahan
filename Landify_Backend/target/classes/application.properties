spring.application.name=landify-backend
spring.profiles.active=dev

# Externalized Configuration (Inject via Env Vars)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/landify?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# JWT Configuration
jwt.secret=${JWT_SECRET:landify-secret-key-landify-secret-key-landify-secret-key}
jwt.expiration=${JWT_EXPIRATION:3600000}

# Performance & Architecture
spring.jpa.open-in-view=false

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

server.port=8080
